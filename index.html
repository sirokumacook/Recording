<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Radio Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        @font-face {
            font-family: 'WRC Clean';
            src: url('WRCCleanRoman.ttf') format('truetype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'WRC Clean';
            src: url('WRCCleanBold.ttf') format('truetype');
            font-weight: bold;
        }

        :root {
            --bg-color: #0f1015;
            --panel-bg: rgba(25, 26, 35, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00e6b8;
            --danger: #ff477e;
            --text-main: #ffffff;
            --text-sub: #8b92a5;
        }

        body {
            font-family: 'WRC Clean', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 230, 184, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3, button, .timer {
            font-family: 'WRC Clean', sans-serif;
            font-weight: bold;
            margin-top: 0;
        }

        .header-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 230, 184, 0.4);
            margin-bottom: 5px;
        }

        .status-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 2rem;
            color: var(--text-main);
            letter-spacing: 3px;
            background: rgba(0,0,0,0.3);
            padding: 5px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .recording-indicator {
            color: var(--danger);
            font-weight: bold;
            display: none;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--danger); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        .studio-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        @media (min-width: 768px) {
            .studio-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        canvas {
            width: 100%;
            height: 90px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85em;
            color: var(--text-sub);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="file"] {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-family: 'WRC Clean', sans-serif;
            outline: none;
        }

        select:focus {
            border-color: var(--accent);
        }

        input[type="range"] {
            accent-color: var(--accent);
            cursor: pointer;
        }

        .bgm-flex {
            display: flex;
            gap: 10px;
        }

        .master-controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        button {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid var(--border);
            padding: 14px 30px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 230, 184, 0.2);
        }

        #btnRecord {
            border-color: var(--danger);
            color: var(--danger);
        }
        #btnRecord:hover:not(:disabled) {
            background: rgba(255, 71, 126, 0.1);
            box-shadow: 0 0 20px rgba(255, 71, 126, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .downloads {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 1100px;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .download-item a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            font-family: 'WRC Clean', sans-serif;
        }

        #sysMessage {
            margin-top: 15px;
            color: var(--accent);
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>RADIO STUDIO MASTER</h1>
        <div class="status-panel">
            <span id="recordingStatus" class="recording-indicator">● REC</span>
            <div id="timerDisplay" class="timer">00:00</div>
        </div>
    </div>

    <div class="studio-container">
        <div class="panel">
            <h2>MIC 1</h2>
            <canvas id="canvasMic1"></canvas>
            <div class="control-group">
                <label>Device Select</label>
                <select id="mic1Select"></select>
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="mic1Vol" min="0" max="2" step="0.01" value="1">
            </div>
        </div>

        <div class="panel">
            <h2>MIC 2</h2>
            <canvas id="canvasMic2"></canvas>
            <div class="control-group">
                <label>Device Select</label>
                <select id="mic2Select"></select>
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="mic2Vol" min="0" max="2" step="0.01" value="1">
            </div>
        </div>

        <div class="panel">
            <h2>BGM DECK</h2>
            <canvas id="canvasBgm"></canvas>
            
            <div class="control-group">
                <label>Track List</label>
                <select id="bgmSelect">
                    <option value="">No Track</option>
                </select>
            </div>

            <div class="control-group">
                <label>Upload New BGM (MP3/WAV)</label>
                <input type="file" id="bgmUpload" accept="audio/*">
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="bgmVol" min="0" max="1" step="0.01" value="0.3">
            </div>
            <audio id="bgmAudio" loop></audio>
        </div>
    </div>

    <div class="master-controls">
        <button id="btnStart">1. INIT STUDIO</button>
        <button id="btnRecord" disabled>2. ● RECORD</button>
        <button id="btnStop" disabled>■ STOP</button>
    </div>
    
    <div id="sysMessage"></div>
    <div id="downloadLinks" class="downloads"></div>

<script>
    // Audio Context & Nodes
    let audioCtx;
    let mixedDest;
    let recorders = {};
    let recordedChunks = {};
    let streamMic1, streamMic2;
    
    let gainMic1, gainMic2, gainBgm;
    let analyserMic1, analyserMic2, analyserBgm;

    // Timer variables
    let startTime;
    let timerInterval;

    // Elements
    const mic1Select = document.getElementById('mic1Select');
    const mic2Select = document.getElementById('mic2Select');
    const bgmSelect = document.getElementById('bgmSelect');
    const bgmAudio = document.getElementById('bgmAudio');
    const bgmUpload = document.getElementById('bgmUpload');
    const timerDisplay = document.getElementById('timerDisplay');
    const sysMsg = document.getElementById('sysMessage');
    
    // IndexedDB for multiple BGM
    const dbName = "RadioStudioDB_v2";
    let db;
    const request = indexedDB.open(dbName, 1);
    
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("bgmFiles", { keyPath: "id", autoIncrement: true });
    };
    
    request.onsuccess = (e) => {
        db = e.target.result;
        updateBgmList();
    };

    // System Message Helper
    const showMsg = (msg) => { sysMsg.innerText = msg; console.log(msg); };

    // Get Mic Devices
    async function getDevices() {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioInputs = devices.filter(d => d.kind === 'audioinput');
            
            [mic1Select, mic2Select].forEach(select => {
                select.innerHTML = '<option value="">None</option>';
                audioInputs.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Mic ${select.options.length}`;
                    select.appendChild(option);
                });
            });
        } catch (err) {
            alert("マイクへのアクセスを許可してください。");
        }
    }

    // Init Audio Context
    async function initAudio() {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mixedDest = audioCtx.createMediaStreamDestination();
            
            gainMic1 = audioCtx.createGain();
            gainMic2 = audioCtx.createGain();
            gainBgm = audioCtx.createGain();
            
            analyserMic1 = audioCtx.createAnalyser();
            analyserMic2 = audioCtx.createAnalyser();
            analyserBgm = audioCtx.createAnalyser();

            // Routing: Source -> Gain -> Analyser -> Dest
            // これにより、Gain（音量）の変更が波形（Analyser）に反映されます
            gainMic1.connect(analyserMic1);
            analyserMic1.connect(mixedDest);

            gainMic2.connect(analyserMic2);
            analyserMic2.connect(mixedDest);

            gainBgm.connect(analyserBgm);
            analyserBgm.connect(mixedDest);
            analyserBgm.connect(audioCtx.destination); // モニター用

            const bgmSource = audioCtx.createMediaElementSource(bgmAudio);
            bgmSource.connect(gainBgm);

            loadVolumes();
            
            drawWaveform('canvasMic1', analyserMic1);
            drawWaveform('canvasMic2', analyserMic2);
            drawWaveform('canvasBgm', analyserBgm, '#ff00ff');
        }

        // Connect Mics
        if (mic1Select.value) {
            if (streamMic1) streamMic1.getTracks().forEach(t => t.stop());
            streamMic1 = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: mic1Select.value } } });
            const source1 = audioCtx.createMediaStreamSource(streamMic1);
            source1.connect(gainMic1);
            setupRecorder('mic1', streamMic1);
        }

        if (mic2Select.value && mic2Select.value !== mic1Select.value) {
            if (streamMic2) streamMic2.getTracks().forEach(t => t.stop());
            streamMic2 = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: mic2Select.value } } });
            const source2 = audioCtx.createMediaStreamSource(streamMic2);
            source2.connect(gainMic2);
            setupRecorder('mic2', streamMic2);
        }

        setupRecorder('master_mix', mixedDest.stream);

        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnRecord').disabled = false;
        showMsg("Studio initialized. Ready to record.");
    }

    // Timer Logic
    function startTimer() {
        startTime = Date.now();
        timerDisplay.innerText = "00:00";
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }, 1000);
    }
    
    function stopTimer() {
        clearInterval(timerInterval);
    }

    // Recorder Setup
    function setupRecorder(id, stream) {
        recordedChunks[id] = [];
        recorders[id] = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        recorders[id].ondataavailable = e => {
            if (e.data.size > 0) recordedChunks[id].push(e.data);
        };
        recorders[id].onstop = async () => {
            const webmBlob = new Blob(recordedChunks[id], { type: 'audio/webm' });
            showMsg(`Converting ${id} to MP3... Please wait.`);
            
            try {
                // WebM Blob を MP3 Blob に変換
                const mp3Blob = await convertToMp3(webmBlob);
                createDownloadLink(mp3Blob, `Radio_${id}_${new Date().getTime()}.mp3`);
                showMsg(`Conversion complete for ${id}.`);
            } catch(e) {
                console.error("MP3 Encode Error:", e);
                showMsg(`MP3 conversion failed for ${id}. Providing WebM format instead.`);
                // 失敗した場合は元の形式で書き出し
                createDownloadLink(webmBlob, `Radio_${id}_fallback.webm`);
            }
        };
    }

    // MP3 Encoding via lamejs and Web Audio API
    async function convertToMp3(blob) {
        // Blob から ArrayBuffer を取得し、AudioContextでPCMデータにデコード
        const arrayBuffer = await blob.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        
        const channels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const kbps = 128;
        
        // lamejs の初期化
        const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, kbps);
        const mp3Data = [];
        
        const left = audioBuffer.getChannelData(0);
        const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
        
        const sampleBlockSize = 1152; // MP3フレームサイズ
        
        for (let i = 0; i < left.length; i += sampleBlockSize) {
            const leftChunk = left.subarray(i, i + sampleBlockSize);
            const rightChunk = right.subarray(i, i + sampleBlockSize);
            
            // Float32 (-1.0 to 1.0) を Int16 (-32768 to 32767) に変換
            const leftInt16 = new Int16Array(leftChunk.length);
            const rightInt16 = new Int16Array(rightChunk.length);
            
            for (let j = 0; j < leftChunk.length; j++) {
                leftInt16[j] = leftChunk[j] < 0 ? leftChunk[j] * 32768 : leftChunk[j] * 32767;
                rightInt16[j] = rightChunk[j] < 0 ? rightChunk[j] * 32768 : rightChunk[j] * 32767;
            }
            
            // エンコード
            const mp3buf = channels === 2 ? 
                mp3encoder.encodeBuffer(leftInt16, rightInt16) :
                mp3encoder.encodeBuffer(leftInt16);
                
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        
        // 最終フレームのフラッシュ
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
        
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    function createDownloadLink(blob, filename) {
        const url = URL.createObjectURL(blob);
        const div = document.createElement('div');
        div.className = 'download-item';
        div.innerHTML = `
            <span>💽 ${filename}</span>
            <a href="${url}" download="${filename}">DOWNLOAD</a>
        `;
        document.getElementById('downloadLinks').appendChild(div);
    }

    // Volumes
    function loadVolumes() {
        document.getElementById('mic1Vol').value = localStorage.getItem('mic1Vol') || 1;
        document.getElementById('mic2Vol').value = localStorage.getItem('mic2Vol') || 1;
        document.getElementById('bgmVol').value = localStorage.getItem('bgmVol') || 0.3;
        updateVolumes();
    }

    function updateVolumes() {
        if(gainMic1) gainMic1.gain.value = document.getElementById('mic1Vol').value;
        if(gainMic2) gainMic2.gain.value = document.getElementById('mic2Vol').value;
        if(gainBgm) gainBgm.gain.value = document.getElementById('bgmVol').value;

        localStorage.setItem('mic1Vol', document.getElementById('mic1Vol').value);
        localStorage.setItem('mic2Vol', document.getElementById('mic2Vol').value);
        localStorage.setItem('bgmVol', document.getElementById('bgmVol').value);
    }

    ['mic1Vol', 'mic2Vol', 'bgmVol'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateVolumes);
    });

    // BGM Upload & IndexedDB Handling
    bgmUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const blob = new Blob([event.target.result], { type: file.type });
                const tx = db.transaction("bgmFiles", "readwrite");
                tx.objectStore("bgmFiles").add({ name: file.name, blob: blob });
                
                tx.oncomplete = () => {
                    updateBgmList();
                    bgmUpload.value = ""; // reset
                    showMsg(`${file.name} saved to storage.`);
                };
            };
            reader.readAsArrayBuffer(file);
        }
    });

    function updateBgmList() {
        const tx = db.transaction("bgmFiles", "readonly");
        const req = tx.objectStore("bgmFiles").getAll();
        
        req.onsuccess = (e) => {
            const files = e.target.result;
            // リストをリセット
            bgmSelect.innerHTML = '<option value="">No Track</option>';
            files.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.text = f.name;
                bgmSelect.appendChild(opt);
            });
            
            // 前回選択したものを復元
            const lastBgm = localStorage.getItem('lastBgmId');
            if (lastBgm && files.find(f => f.id == lastBgm)) {
                bgmSelect.value = lastBgm;
                playSelectedBgm();
            }
        };
    }

    bgmSelect.addEventListener('change', () => {
        localStorage.setItem('lastBgmId', bgmSelect.value);
        playSelectedBgm();
    });

    function playSelectedBgm() {
        const id = parseInt(bgmSelect.value);
        if (!id) {
            bgmAudio.src = "";
            return;
        }
        
        const tx = db.transaction("bgmFiles", "readonly");
        const req = tx.objectStore("bgmFiles").get(id);
        req.onsuccess = (e) => {
            if (e.target.result) {
                bgmAudio.src = URL.createObjectURL(e.target.result.blob);
                // 録音中でなければ一時停止状態にしておく
                if(document.getElementById('btnRecord').disabled === false) {
                    bgmAudio.pause();
                }
            }
        };
    }

    // Recording Controls
    document.getElementById('btnStart').addEventListener('click', initAudio);
    
    document.getElementById('btnRecord').addEventListener('click', () => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(bgmSelect.value) bgmAudio.play();
        
        Object.values(recorders).forEach(r => r.start());
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('recordingStatus').style.display = 'block';
        document.getElementById('downloadLinks').innerHTML = ''; 
        
        startTimer();
        showMsg("Recording...");
    });

    document.getElementById('btnStop').addEventListener('click', () => {
        bgmAudio.pause();
        bgmAudio.currentTime = 0; // 巻き戻し
        
        Object.values(recorders).forEach(r => {
            if(r.state !== 'inactive') r.stop();
        });
        
        document.getElementById('btnRecord').disabled = false;
        document.getElementById('btnStop').disabled = true;
        document.getElementById('recordingStatus').style.display = 'none';
        
        stopTimer();
    });

    // Waveform Visualization
    function drawWaveform(canvasId, analyser, color = '#00e6b8') {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        analyser.fftSize = 2048;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = color;
            ctx.beginPath();

            const sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }
        draw();
    }

    // App Init
    getDevices();
    navigator.mediaDevices.addEventListener('devicechange', getDevices);
</script>
</body>
</html>
