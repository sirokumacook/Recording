<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Radio Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @font-face {
            font-family: 'WRC Clean';
            src: url('WRCCleanRoman.ttf') format('truetype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'WRC Clean';
            src: url('WRCCleanBold.ttf') format('truetype');
            font-weight: bold;
        }

        :root {
            --bg-color: #0f1015;
            --panel-bg: rgba(25, 26, 35, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00e6b8;
            --danger: #ff477e;
            --text-main: #ffffff;
            --text-sub: #8b92a5;
        }

        body {
            font-family: 'WRC Clean', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 230, 184, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3, button, .timer {
            font-family: 'WRC Clean', sans-serif;
            font-weight: bold;
            margin-top: 0;
        }

        .header-bar {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            color: var(--accent);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 230, 184, 0.4);
            margin-bottom: 5px;
        }

        .btn-mode-switch {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 0.9em;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .status-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 2rem;
            color: var(--text-main);
            letter-spacing: 3px;
            background: rgba(0,0,0,0.3);
            padding: 5px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .recording-indicator {
            color: var(--danger);
            font-weight: bold;
            display: none;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--danger); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        /* Studio Mode UI */
        .studio-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        @media (min-width: 768px) {
            .studio-container { grid-template-columns: repeat(3, 1fr); }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        canvas {
            width: 100%;
            height: 90px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85em;
            color: var(--text-sub);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        select, input[type="file"] {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-family: 'WRC Clean', sans-serif;
            outline: none;
        }

        input[type="range"] {
            accent-color: var(--accent);
            cursor: pointer;
        }

        .master-controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        button {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 230, 184, 0.2);
        }

        .btn-p2p {
            border-color: #8b92a5;
            margin-top: 5px;
            font-size: 0.9em;
            padding: 8px 16px;
        }

        #btnRecord {
            border-color: var(--danger);
            color: var(--danger);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .downloads {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 1100px;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .download-item a { color: var(--accent); text-decoration: none; font-weight: bold; }
        #sysMessage { margin-top: 15px; color: var(--accent); font-size: 0.9em; }

        /* Remote Mic UI */
        #remoteModeUI {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }
        .pin-display {
            font-size: 5rem;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(0,230,184,0.5);
            margin: 20px 0;
            font-family: 'WRC Clean', sans-serif;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>RADIO STUDIO</h1>
        <button class="btn-mode-switch" onclick="toggleMode()" id="modeBtn">📱 リモートマイクにする</button>
        <div class="status-panel" id="studioStatus">
            <span id="recordingStatus" class="recording-indicator">● REC</span>
            <div id="timerDisplay" class="timer">00:00</div>
        </div>
    </div>

    <div class="studio-container" id="studioUI">
        <div class="panel">
            <h2>MIC 1</h2>
            <canvas id="canvasMic1"></canvas>
            <div class="control-group">
                <label>Device Select</label>
                <select id="mic1Select"></select>
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="mic1Vol" min="0" max="2" step="0.01" value="1">
            </div>
        </div>

        <div class="panel">
            <h2>MIC 2 / REMOTE</h2>
            <canvas id="canvasMic2"></canvas>
            <div class="control-group">
                <label>Device Select</label>
                <select id="mic2Select"></select>
                <button class="btn-p2p" onclick="connectRemoteMic()">📡 別デバイスをマイクとして使う</button>
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="mic2Vol" min="0" max="2" step="0.01" value="1">
            </div>
        </div>

        <div class="panel">
            <h2>BGM DECK</h2>
            <canvas id="canvasBgm"></canvas>
            <div class="control-group">
                <label>Track List</label>
                <select id="bgmSelect"><option value="">No Track</option></select>
            </div>
            <div class="control-group">
                <label>Upload New BGM</label>
                <input type="file" id="bgmUpload" accept=".mp3, .wav, audio/mpeg, audio/wav, audio/*">
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="bgmVol" min="0" max="1" step="0.01" value="0.3">
            </div>
            <audio id="bgmAudio" loop></audio>
        </div>
    </div>

    <div class="master-controls" id="studioControls">
        <button id="btnStart">1. INIT STUDIO</button>
        <button id="btnRecord" disabled>2. ● RECORD</button>
        <button id="btnStop" disabled>■ STOP</button>
    </div>
    
    <div id="remoteModeUI">
        <h2>REMOTE MIC MODE</h2>
        <p>スタジオ側の「別デバイスをマイクとして使う」を押し、<br>以下のPINを入力してください</p>
        <div class="pin-display" id="pinDisplay">----</div>
        <div id="remoteSysMsg" style="color:var(--text-sub);">待機中...</div>
    </div>

    <div id="sysMessage"></div>
    <div id="downloadLinks" class="downloads"></div>

<script>
    // --- Audio System Variables ---
    let audioCtx, mixedDest;
    let recorders = {}, recordedChunks = {};
    let streamMic1, streamMic2;
    let gainMic1, gainMic2, gainBgm;
    let analyserMic1, analyserMic2, analyserBgm;
    let startTime, timerInterval;

    // --- P2P Variables ---
    let peer; 
    let isRemoteMode = false;

    // --- Elements ---
    const sysMsg = document.getElementById('sysMessage');
    const showMsg = (msg) => { sysMsg.innerText = msg; console.log(msg); };

    // --- Mode Switching ---
    function toggleMode() {
        isRemoteMode = !isRemoteMode;
        if(isRemoteMode) {
            document.getElementById('studioUI').style.display = 'none';
            document.getElementById('studioControls').style.display = 'none';
            document.getElementById('studioStatus').style.display = 'none';
            document.getElementById('remoteModeUI').style.display = 'flex';
            document.getElementById('modeBtn').innerText = "🎛 スタジオに戻る";
            initRemoteMic();
        } else {
            document.getElementById('studioUI').style.display = 'grid';
            document.getElementById('studioControls').style.display = 'flex';
            document.getElementById('studioStatus').style.display = 'flex';
            document.getElementById('remoteModeUI').style.display = 'none';
            document.getElementById('modeBtn').innerText = "📱 リモートマイクにする";
            if(peer) { peer.destroy(); peer = null; }
        }
    }

    // ==========================================
    // P2P: REMOTE MIC MODE (Client)
    // ==========================================
    function initRemoteMic() {
        const pin = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('pinDisplay').innerText = pin;
        document.getElementById('remoteSysMsg').innerText = "通信サーバーに接続中...";

        peer = new Peer('radio-mic-' + pin);

        peer.on('open', id => {
            document.getElementById('remoteSysMsg').innerText = "PIN待機中... スタジオから接続してください。";
        });

        // スタジオ側からのハンドシェイク（データ通信）を受信
        peer.on('connection', conn => {
            conn.on('data', async (data) => {
                if(data.action === 'handshake') {
                    document.getElementById('remoteSysMsg').innerText = "スタジオからの要求を確認。マイクを接続中...";
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        // こちらからスタジオに向けて音声ストリームを発信
                        peer.call(data.hostId, stream);
                        document.getElementById('remoteSysMsg').innerText = "🔴 スタジオに音声を送信中！";
                        document.getElementById('remoteSysMsg').style.color = var(--danger);
                    } catch(err) {
                        alert("マイクの許可が得られませんでした。");
                        document.getElementById('remoteSysMsg').innerText = "マイクエラー";
                    }
                }
            });
        });
    }

    // ==========================================
    // P2P: STUDIO MODE (Host)
    // ==========================================
    function initHostPeer(onReady) {
        if(!peer || peer.disconnected) {
            peer = new Peer();
            peer.on('open', onReady);
            
            // リモートからの音声ストリーム着信を処理
            peer.on('call', call => {
                call.answer(); // 受信するだけなので引数なしで応答
                call.on('stream', remoteStream => {
                    showMsg("✅ リモートマイクの接続に成功しました！");
                    
                    // Mic 2をリモートストリームで上書き
                    if (streamMic2) streamMic2.getTracks().forEach(t => t.stop());
                    streamMic2 = remoteStream;
                    
                    const source2 = audioCtx.createMediaStreamSource(streamMic2);
                    // 以前の接続をリセットして新しく繋ぐ
                    gainMic2.disconnect();
                    gainMic2 = audioCtx.createGain();
                    gainMic2.connect(analyserMic2);
                    source2.connect(gainMic2);
                    
                    setupRecorder('mic2', streamMic2);
                    updateVolumes();
                    
                    // UI更新
                    const select = document.getElementById('mic2Select');
                    select.innerHTML = '<option value="remote">📱 Remote Device connected</option>';
                });
            });
        } else {
            onReady();
        }
    }

    function connectRemoteMic() {
        if(!audioCtx) return alert("先に「1. INIT STUDIO」を押してシステムを起動してください。");
        
        const pin = prompt("別デバイスに表示されている4桁のPINを入力してください:");
        if(!pin || pin.length !== 4) return;

        showMsg("リモートデバイスに接続中...");

        initHostPeer(() => {
            // ハンドシェイク送信: リモートデバイスに「自分のID」を教えてコールさせる
            const conn = peer.connect('radio-mic-' + pin);
            conn.on('open', () => {
                conn.send({ action: 'handshake', hostId: peer.id });
                showMsg("ハンドシェイク完了。リモートからの音声着信を待機中...");
            });
            conn.on('error', err => {
                showMsg("接続エラー: PINが間違っているか、デバイスが見つかりません。");
            });
        });
    }


    // ==========================================
    // STUDIO AUDIO LOGIC
    // ==========================================
    const dbName = "RadioStudioDB_v2";
    let db;
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("bgmFiles", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; updateBgmList(); };

    async function getDevices() {
        if(isRemoteMode) return;
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioInputs = devices.filter(d => d.kind === 'audioinput');
            
            [document.getElementById('mic1Select'), document.getElementById('mic2Select')].forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '<option value="">None</option>';
                audioInputs.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Mic ${select.options.length}`;
                    select.appendChild(option);
                });
                if(currentVal && currentVal !== 'remote') select.value = currentVal;
            });
        } catch (err) {
            console.log("Mic access denied on load.");
        }
    }

    async function initAudio() {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mixedDest = audioCtx.createMediaStreamDestination();
            
            gainMic1 = audioCtx.createGain();
            gainMic2 = audioCtx.createGain();
            gainBgm = audioCtx.createGain();
            
            analyserMic1 = audioCtx.createAnalyser();
            analyserMic2 = audioCtx.createAnalyser();
            analyserBgm = audioCtx.createAnalyser();

            gainMic1.connect(analyserMic1); analyserMic1.connect(mixedDest);
            gainMic2.connect(analyserMic2); analyserMic2.connect(mixedDest);
            gainBgm.connect(analyserBgm); 
            analyserBgm.connect(mixedDest);
            analyserBgm.connect(audioCtx.destination); 

            const bgmSource = audioCtx.createMediaElementSource(document.getElementById('bgmAudio'));
            bgmSource.connect(gainBgm);

            loadVolumes();
            drawWaveform('canvasMic1', analyserMic1);
            drawWaveform('canvasMic2', analyserMic2);
            drawWaveform('canvasBgm', analyserBgm, '#ff00ff');
        }

        const mic1Select = document.getElementById('mic1Select').value;
        if (mic1Select) {
            if (streamMic1) streamMic1.getTracks().forEach(t => t.stop());
            streamMic1 = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: mic1Select } } });
            const source1 = audioCtx.createMediaStreamSource(streamMic1);
            source1.connect(gainMic1);
            setupRecorder('mic1', streamMic1);
        }

        const mic2Select = document.getElementById('mic2Select').value;
        if (mic2Select && mic2Select !== 'remote' && mic2Select !== mic1Select) {
            if (streamMic2) streamMic2.getTracks().forEach(t => t.stop());
            streamMic2 = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: mic2Select } } });
            const source2 = audioCtx.createMediaStreamSource(streamMic2);
            source2.connect(gainMic2);
            setupRecorder('mic2', streamMic2);
        }

        setupRecorder('master_mix', mixedDest.stream);

        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnRecord').disabled = false;
        showMsg("Studio initialized. Ready to record.");
    }

    function startTimer() {
        startTime = Date.now();
        document.getElementById('timerDisplay').innerText = "00:00";
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }, 1000);
    }

    function setupRecorder(id, stream) {
        recordedChunks[id] = [];
        recorders[id] = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        recorders[id].ondataavailable = e => { if (e.data.size > 0) recordedChunks[id].push(e.data); };
        recorders[id].onstop = async () => {
            const webmBlob = new Blob(recordedChunks[id], { type: 'audio/webm' });
            showMsg(`Converting ${id} to MP3... Please wait.`);
            try {
                const mp3Blob = await convertToMp3(webmBlob);
                createDownloadLink(mp3Blob, `Radio_${id}_${new Date().getTime()}.mp3`);
                showMsg(`Conversion complete for ${id}.`);
            } catch(e) {
                console.error(e);
                createDownloadLink(webmBlob, `Radio_${id}_fallback.webm`);
            }
        };
    }

    async function convertToMp3(blob) {
        const arrayBuffer = await blob.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const channels = audioBuffer.numberOfChannels;
        const mp3encoder = new lamejs.Mp3Encoder(channels, audioBuffer.sampleRate, 128);
        const mp3Data = [];
        const left = audioBuffer.getChannelData(0);
        const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
        
        for (let i = 0; i < left.length; i += 1152) {
            const leftChunk = left.subarray(i, i + 1152);
            const rightChunk = right.subarray(i, i + 1152);
            const leftInt16 = new Int16Array(leftChunk.length);
            const rightInt16 = new Int16Array(rightChunk.length);
            for (let j = 0; j < leftChunk.length; j++) {
                leftInt16[j] = leftChunk[j] < 0 ? leftChunk[j] * 32768 : leftChunk[j] * 32767;
                rightInt16[j] = rightChunk[j] < 0 ? rightChunk[j] * 32768 : rightChunk[j] * 32767;
            }
            const mp3buf = channels === 2 ? mp3encoder.encodeBuffer(leftInt16, rightInt16) : mp3encoder.encodeBuffer(leftInt16);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    function createDownloadLink(blob, filename) {
        const url = URL.createObjectURL(blob);
        const div = document.createElement('div');
        div.className = 'download-item';
        div.innerHTML = `<span>💽 ${filename}</span><a href="${url}" download="${filename}">DOWNLOAD</a>`;
        document.getElementById('downloadLinks').appendChild(div);
    }

    function loadVolumes() {
        ['mic1Vol', 'mic2Vol', 'bgmVol'].forEach(id => {
            const saved = localStorage.getItem(id);
            if(saved) document.getElementById(id).value = saved;
        });
        updateVolumes();
    }

    function updateVolumes() {
        if(gainMic1) gainMic1.gain.value = document.getElementById('mic1Vol').value;
        if(gainMic2) gainMic2.gain.value = document.getElementById('mic2Vol').value;
        if(gainBgm) gainBgm.gain.value = document.getElementById('bgmVol').value;
        ['mic1Vol', 'mic2Vol', 'bgmVol'].forEach(id => {
            localStorage.setItem(id, document.getElementById(id).value);
        });
    }

    ['mic1Vol', 'mic2Vol', 'bgmVol'].forEach(id => document.getElementById(id).addEventListener('input', updateVolumes));

    document.getElementById('bgmUpload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const tx = db.transaction("bgmFiles", "readwrite");
                tx.objectStore("bgmFiles").add({ name: file.name, blob: new Blob([event.target.result], { type: file.type }) });
                tx.oncomplete = () => {
                    updateBgmList();
                    e.target.value = ""; 
                    showMsg(`${file.name} saved.`);
                };
            };
            reader.readAsArrayBuffer(file);
        }
    });

    function updateBgmList() {
        const tx = db.transaction("bgmFiles", "readonly");
        const req = tx.objectStore("bgmFiles").getAll();
        req.onsuccess = (e) => {
            const select = document.getElementById('bgmSelect');
            select.innerHTML = '<option value="">No Track</option>';
            e.target.result.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id; opt.text = f.name;
                select.appendChild(opt);
            });
            const last = localStorage.getItem('lastBgmId');
            if (last && e.target.result.find(f => f.id == last)) {
                select.value = last;
                playSelectedBgm();
            }
        };
    }

    document.getElementById('bgmSelect').addEventListener('change', () => {
        localStorage.setItem('lastBgmId', document.getElementById('bgmSelect').value);
        playSelectedBgm();
    });

    function playSelectedBgm() {
        const id = parseInt(document.getElementById('bgmSelect').value);
        const audio = document.getElementById('bgmAudio');
        if (!id) return audio.src = "";
        
        const req = db.transaction("bgmFiles", "readonly").objectStore("bgmFiles").get(id);
        req.onsuccess = (e) => {
            if (e.target.result) {
                audio.src = URL.createObjectURL(e.target.result.blob);
                if(document.getElementById('btnRecord').disabled === false) audio.pause();
            }
        };
    }

    document.getElementById('btnStart').addEventListener('click', initAudio);
    
    document.getElementById('btnRecord').addEventListener('click', () => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(document.getElementById('bgmSelect').value) document.getElementById('bgmAudio').play();
        
        Object.values(recorders).forEach(r => r.start());
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('recordingStatus').style.display = 'block';
        document.getElementById('downloadLinks').innerHTML = ''; 
        
        startTimer();
        showMsg("Recording...");
    });

    document.getElementById('btnStop').addEventListener('click', () => {
        const audio = document.getElementById('bgmAudio');
        audio.pause();
        audio.currentTime = 0; 
        
        Object.values(recorders).forEach(r => { if(r.state !== 'inactive') r.stop(); });
        
        document.getElementById('btnRecord').disabled = false;
        document.getElementById('btnStop').disabled = true;
        document.getElementById('recordingStatus').style.display = 'none';
        
        clearInterval(timerInterval);
    });

    function drawWaveform(canvasId, analyser, color = '#00e6b8') {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        analyser.fftSize = 2048;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = color;
            ctx.beginPath();
            const sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) {
                const y = (dataArray[i] / 128.0) * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }
        draw();
    }

    getDevices();
    navigator.mediaDevices.addEventListener('devicechange', getDevices);
</script>
