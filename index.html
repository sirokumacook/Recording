<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Radio Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @font-face {
            font-family: 'WRC Clean';
            src: url('WRCCleanRoman.ttf') format('truetype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'WRC Clean';
            src: url('WRCCleanBold.ttf') format('truetype');
            font-weight: bold;
        }

        :root {
            --bg-color: #0d0e12;
            --panel-bg: rgba(20, 22, 30, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00e6b8;
            --danger: #ff477e;
            --text-main: #ffffff;
            --text-sub: #8b92a5;
        }

        body {
            font-family: 'WRC Clean', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 230, 184, 0.05) 0%, transparent 60%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3, button, .timer, input {
            font-family: 'WRC Clean', sans-serif;
            font-weight: bold;
            margin-top: 0;
        }

        .header-bar {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: var(--accent);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 230, 184, 0.4);
            margin-bottom: 5px;
        }

        .btn-mode-switch {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 0.9em;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .status-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 2.5rem;
            color: var(--text-main);
            letter-spacing: 4px;
            background: rgba(0,0,0,0.5);
            padding: 5px 25px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .recording-indicator {
            color: var(--danger);
            font-size: 1.2rem;
            display: none;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--danger); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        .studio-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) { .studio-container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .studio-container { grid-template-columns: repeat(3, 1fr); } }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .mic-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--text-sub);
            color: var(--text-main);
            font-size: 1.5em;
            width: 100%;
            margin-bottom: 10px;
            outline: none;
            transition: all 0.3s;
        }
        .mic-name-input:focus { border-bottom-color: var(--accent); }

        canvas {
            width: 100%;
            height: 90px;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        .control-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        label { font-size: 0.8em; color: var(--text-sub); margin-bottom: 4px; letter-spacing: 1px; }

        select, input[type="file"] {
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-family: 'WRC Clean', sans-serif;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="range"] { accent-color: var(--accent); cursor: pointer; }

        .btn-p2p {
            border-color: #8b92a5;
            margin-top: 8px;
            font-size: 0.85em;
            padding: 6px 12px;
        }

        .master-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
        }

        button {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 230, 184, 0.2);
        }

        #btnRecord { border-color: var(--danger); color: var(--danger); }
        #btnRecord:hover:not(:disabled) { box-shadow: 0 0 15px rgba(255, 71, 126, 0.4); background: rgba(255,71,126,0.1); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .downloads { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 10px; }
        .download-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border);
        }
        .download-item a { color: var(--accent); text-decoration: none; }
        #sysMessage { color: var(--accent); font-size: 0.9em; margin-bottom: 10px; text-align: center; height: 20px;}

        #remoteModeUI {
            display: none; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center;
        }
        .pin-display {
            font-size: 6rem; color: var(--accent); letter-spacing: 15px; text-shadow: 0 0 25px rgba(0,230,184,0.5); margin: 20px 0;
        }
        
        #powerOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #powerOverlay button { font-size: 2em; padding: 20px 50px; border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div id="powerOverlay">
        <h1 style="font-size: 3em; margin-bottom: 30px;">RADIO STUDIO</h1>
        <button onclick="powerOn()">POWER ON SYSTEM</button>
        <p style="color: var(--text-sub); margin-top: 20px;">※ブラウザのマイク許可を求めてきます</p>
        <p id="powerErrorMsg" style="color: var(--danger); margin-top: 10px; display:none;">マイクが認識されませんでしたが、システムを強制起動します。</p>
    </div>

    <div class="header-bar">
        <h1>RADIO STUDIO</h1>
        <button class="btn-mode-switch" onclick="toggleMode()" id="modeBtn">📱 SWITCH TO REMOTE MODE</button>
        <div class="status-panel" id="studioStatus">
            <span id="recordingStatus" class="recording-indicator">● REC</span>
            <div id="timerDisplay" class="timer">00:00</div>
        </div>
    </div>

    <div id="sysMessage">System Standby...</div>

    <div id="studioUI">
        <div class="master-controls" id="studioControls">
            <button id="btnAddMic" onclick="addMicPanel()">➕ ADD MIC</button>
            <button id="btnRecord" disabled>● RECORD (320kbps)</button>
            <button id="btnStop" disabled>■ STOP</button>
        </div>

        <div class="studio-container" id="micsContainer">
            </div>

        <div class="studio-container">
            <div class="panel" style="grid-column: 1 / -1;">
                <h2>BGM DECK</h2>
                <canvas id="canvasBgm"></canvas>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
                    <div class="control-group">
                        <label>Track List</label>
                        <select id="bgmSelect"><option value="">No Track</option></select>
                    </div>
                    <div class="control-group">
                        <label>Upload New BGM (Multiple OK)</label>
                        <input type="file" id="bgmUpload" accept="audio/mpeg, audio/mp3, audio/wav, .mp3, .wav, .m4a, audio/*" multiple>
                    </div>
                    <div class="control-group">
                        <label>Volume</label>
                        <input type="range" id="bgmVol" min="0" max="1" step="0.01" value="0.3">
                    </div>
                </div>
                <audio id="bgmAudio" loop></audio>
            </div>
        </div>
    </div>
    
    <div id="remoteModeUI">
        <h2>REMOTE MIC MODE</h2>
        <p>Click "CONNECT REMOTE" on the studio device and enter this PIN.</p>
        <div class="pin-display" id="pinDisplay">----</div>
        <div id="remoteSysMsg" style="color:var(--text-sub);">Waiting for connection...</div>
    </div>

    <div id="downloadLinks" class="downloads"></div>

<script>
    let audioCtx, mixedDest;
    let micState = {}; 
    let bgmState = { gain: null, analyser: null, recorder: null };
    let masterRecorder;
    let recordedChunks = { master: [] };
    let cachedDevices = [];
    
    let startTime, timerInterval;
    let peer; 
    let isRemoteMode = false;
    let micCounter = 0;

    const sysMsg = document.getElementById('sysMessage');
    const showMsg = (msg) => { sysMsg.innerText = msg; console.log(msg); };

    // ==========================================
    // System Initialization (エラーでも突破する)
    // ==========================================
    async function powerOn() {
        let dummyStream = null;
        try {
            // マイク権限を要求。失敗してもcatchで拾って処理を続行。
            dummyStream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(err => {
                console.warn("マイクアクセス不可。強制起動します。", err);
                document.getElementById('powerErrorMsg').style.display = 'block';
                return null;
            });
            
            // AudioContextの初期化
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mixedDest = audioCtx.createMediaStreamDestination();
            
            // BGM Setup
            bgmState.gain = audioCtx.createGain();
            bgmState.analyser = audioCtx.createAnalyser();
            bgmState.gain.connect(bgmState.analyser);
            bgmState.analyser.connect(mixedDest);
            bgmState.analyser.connect(audioCtx.destination); 
            
            const bgmSource = audioCtx.createMediaElementSource(document.getElementById('bgmAudio'));
            bgmSource.connect(bgmState.gain);
            drawWaveform('canvasBgm', bgmState.analyser, '#ff00ff');
            document.getElementById('bgmVol').addEventListener('input', (e) => {
                bgmState.gain.gain.value = e.target.value;
            });

            // Master Recorder Setup
            masterRecorder = new MediaRecorder(mixedDest.stream, { mimeType: 'audio/webm' });
            masterRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.master.push(e.data); };
            masterRecorder.onstop = () => convertAndDownload(recordedChunks.master, 'Master_Mix');

            await updateDeviceList();
            
            // 少し待ってからUIを切り替え（ユーザーにエラーメッセージを読ませるため）
            setTimeout(() => {
                document.getElementById('powerOverlay').style.display = 'none';
                document.getElementById('btnRecord').disabled = false;
                addMicPanel(); // 初期マイクを1つ追加
                
                if(dummyStream) dummyStream.getTracks().forEach(t => t.stop());
                showMsg("System Online. Ready.");
            }, dummyStream ? 100 : 1500);

        } catch (e) {
            console.error("Critical System Error:", e);
            alert("システムを起動できませんでした。リロードしてください。");
        }
    }

    // ==========================================
    // Dynamic Mic Management
    // ==========================================
    async function updateDeviceList() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            cachedDevices = devices.filter(d => d.kind === 'audioinput');
        } catch(e) {
            cachedDevices = [];
        }
        Object.keys(micState).forEach(micId => populateMicSelect(micId));
    }

    navigator.mediaDevices.addEventListener('devicechange', updateDeviceList);

    function addMicPanel() {
        micCounter++;
        const micId = `mic_${Date.now()}`;
        
        micState[micId] = {
            gain: audioCtx.createGain(),
            analyser: audioCtx.createAnalyser(),
            stream: null,
            recorder: null,
            peerConn: null,
            recordedChunks: []
        };
        
        micState[micId].gain.connect(micState[micId].analyser);
        micState[micId].analyser.connect(mixedDest);

        const container = document.createElement('div');
        container.className = 'panel';
        container.id = `panel_${micId}`;
        container.innerHTML = `
            <input type="text" class="mic-name-input" id="name_${micId}" value="MIC ${micCounter}">
            <canvas id="canvas_${micId}"></canvas>
            
            <div class="control-group">
                <label>Device Select</label>
                <select id="select_${micId}" onchange="handleMicChange('${micId}')"></select>
                <button class="btn-p2p" onclick="connectRemoteMic('${micId}')">📡 CONNECT REMOTE</button>
            </div>
            
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="vol_${micId}" min="0" max="2" step="0.01" value="1" oninput="changeMicVol('${micId}', this.value)">
            </div>
            
            <button class="btn-p2p" style="border-color: var(--danger); color: var(--danger); margin-top:auto;" onclick="removeMic('${micId}')">🗑 REMOVE</button>
        `;
        
        document.getElementById('micsContainer').appendChild(container);
        populateMicSelect(micId);
        drawWaveform(`canvas_${micId}`, micState[micId].analyser, '#00e6b8');
    }

    function populateMicSelect(micId) {
        const select = document.getElementById(`select_${micId}`);
        if(!select) return;
        const currentVal = select.value;
        
        select.innerHTML = '<option value="">None / Off</option>';
        cachedDevices.forEach((device, index) => {
            const opt = document.createElement('option');
            opt.value = device.deviceId;
            // 権限がないとラベルが空になるためフォールバック
            opt.text = device.label || `Hardware Mic ${index + 1}`;
            select.appendChild(opt);
        });
        
        if(micState[micId].peerConn) {
            const opt = document.createElement('option');
            opt.value = 'remote';
            opt.text = '📱 REMOTE DEVICE CONNECTED';
            select.appendChild(opt);
            select.value = 'remote';
        } else if (currentVal && currentVal !== 'remote') {
            select.value = currentVal;
        }
    }

    async function handleMicChange(micId) {
        const state = micState[micId];
        const deviceId = document.getElementById(`select_${micId}`).value;
        
        if(state.stream) state.stream.getTracks().forEach(t => t.stop());
        if(state.peerConn && deviceId !== 'remote') {
            state.peerConn.close();
            state.peerConn = null;
        }

        if(deviceId && deviceId !== 'remote') {
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: deviceId } } });
                const source = audioCtx.createMediaStreamSource(state.stream);
                source.connect(state.gain);
                showMsg(`Mic applied to ${document.getElementById('name_'+micId).value}`);
            } catch (e) {
                console.warn("Failed to apply mic:", e);
                showMsg("マイクの適用に失敗しました。デバイスがロックされている可能性があります。");
            }
        }
    }

    function changeMicVol(micId, val) {
        if(micState[micId]) micState[micId].gain.gain.value = val;
    }

    function removeMic(micId) {
        const state = micState[micId];
        if(state.stream) state.stream.getTracks().forEach(t => t.stop());
        if(state.peerConn) state.peerConn.close();
        if(state.gain) state.gain.disconnect();
        
        document.getElementById(`panel_${micId}`).remove();
        delete micState[micId];
    }

    // ==========================================
    // Mode Switching
    // ==========================================
    function toggleMode() {
        isRemoteMode = !isRemoteMode;
        if(isRemoteMode) {
            document.getElementById('studioUI').style.display = 'none';
            document.getElementById('studioStatus').style.display = 'none';
            document.getElementById('remoteModeUI').style.display = 'flex';
            document.getElementById('modeBtn').innerText = "🎛 SWITCH TO STUDIO";
            initRemoteMicClient();
        } else {
            document.getElementById('studioUI').style.display = 'block';
            document.getElementById('studioStatus').style.display = 'flex';
            document.getElementById('remoteModeUI').style.display = 'none';
            document.getElementById('modeBtn').innerText = "📱 SWITCH TO REMOTE MODE";
            if(peer) { peer.destroy(); peer = null; }
        }
    }

    // ==========================================
    // P2P: REMOTE MIC MODE (Client)
    // ==========================================
    function initRemoteMicClient() {
        const pin = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('pinDisplay').innerText = pin;
        document.getElementById('remoteSysMsg').innerText = "Connecting to P2P Server...";

        peer = new Peer('radio-mic-' + pin);

        peer.on('open', () => {
            document.getElementById('remoteSysMsg').innerText = "Waiting for Host connection...";
        });

        peer.on('connection', conn => {
            conn.on('data', async (data) => {
                if(data.action === 'handshake') {
                    document.getElementById('remoteSysMsg').innerText = "Handshake received. Accessing Mic...";
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        peer.call(data.hostId, stream, { metadata: { targetMicId: data.targetMicId } });
                        
                        document.getElementById('remoteSysMsg').innerText = "🔴 Streaming Audio to Studio!";
                        document.getElementById('remoteSysMsg').style.color = "var(--danger)";
                    } catch(err) {
                        document.getElementById('remoteSysMsg').innerText = "Mic Error. Check permissions.";
                    }
                }
            });
        });
    }

    // ==========================================
    // P2P: STUDIO MODE (Host)
    // ==========================================
    function getHostPeer(onReady) {
        if(!peer || peer.disconnected) {
            peer = new Peer();
            peer.on('open', onReady);
            
            peer.on('call', call => {
                call.answer(); 
                const targetMicId = call.metadata.targetMicId; 
                
                call.on('stream', remoteStream => {
                    if(micState[targetMicId]) {
                        showMsg(`✅ Remote Mic connected to ${document.getElementById('name_'+targetMicId).value}`);
                        const state = micState[targetMicId];
                        
                        if (state.stream) state.stream.getTracks().forEach(t => t.stop());
                        state.stream = remoteStream;
                        state.peerConn = call;
                        
                        state.gain.disconnect();
                        state.gain = audioCtx.createGain();
                        state.gain.connect(state.analyser);
                        state.gain.gain.value = document.getElementById(`vol_${targetMicId}`).value;
                        
                        const source = audioCtx.createMediaStreamSource(state.stream);
                        source.connect(state.gain);
                        
                        populateMicSelect(targetMicId); 
                    }
                });
            });
        } else {
            onReady();
        }
    }

    function connectRemoteMic(micId) {
        const pin = prompt("Enter the 4-digit PIN displayed on the remote device:");
        if(!pin || pin.length !== 4) return;

        showMsg("Connecting to remote device...");

        getHostPeer(() => {
            const conn = peer.connect('radio-mic-' + pin);
            conn.on('open', () => {
                conn.send({ action: 'handshake', hostId: peer.id, targetMicId: micId });
                showMsg("Handshake sent. Waiting for audio stream...");
            });
            conn.on('error', () => {
                showMsg("Connection failed. PIN might be wrong.");
            });
        });
    }

    // ==========================================
    // Recording
    // ==========================================
    function startTimer() {
        startTime = Date.now();
        document.getElementById('timerDisplay').innerText = "00:00";
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }, 1000);
    }

    document.getElementById('btnRecord').addEventListener('click', () => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(document.getElementById('bgmSelect').value) document.getElementById('bgmAudio').play();
        
        Object.keys(micState).forEach(id => {
            if(micState[id].stream) {
                micState[id].recordedChunks = [];
                micState[id].recorder = new MediaRecorder(micState[id].stream, { mimeType: 'audio/webm' });
                micState[id].recorder.ondataavailable = e => { if (e.data.size > 0) micState[id].recordedChunks.push(e.data); };
                const name = document.getElementById(`name_${id}`).value;
                micState[id].recorder.onstop = () => convertAndDownload(micState[id].recordedChunks, name);
                micState[id].recorder.start();
            }
        });
        
        recordedChunks.master = [];
        masterRecorder.start();
        
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('recordingStatus').style.display = 'block';
        document.getElementById('downloadLinks').innerHTML = ''; 
        
        startTimer();
        showMsg("● Recording in progress...");
    });

    document.getElementById('btnStop').addEventListener('click', () => {
        const audio = document.getElementById('bgmAudio');
        audio.pause();
        audio.currentTime = 0; 
        
        masterRecorder.stop();
        Object.values(micState).forEach(state => {
            if(state.recorder && state.recorder.state !== 'inactive') state.recorder.stop();
        });
        
        document.getElementById('btnRecord').disabled = false;
        document.getElementById('btnStop').disabled = true;
        document.getElementById('recordingStatus').style.display = 'none';
        
        clearInterval(timerInterval);
        showMsg("Recording stopped. Encoding MP3 (320kbps)...");
    });

    // MP3 Encoding (High Quality: 320kbps)
    async function convertAndDownload(chunks, filenameRaw) {
        const safeName = filenameRaw.replace(/[^a-z0-9]/gi, '_');
        const webmBlob = new Blob(chunks, { type: 'audio/webm' });
        
        try {
            const arrayBuffer = await webmBlob.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const channels = audioBuffer.numberOfChannels;
            
            // ★ 高音質化: 320 kbps に設定 ★
            const mp3encoder = new lamejs.Mp3Encoder(channels, audioBuffer.sampleRate, 320);
            const mp3Data = [];
            
            const left = audioBuffer.getChannelData(0);
            const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
            
            for (let i = 0; i < left.length; i += 1152) {
                const lChunk = left.subarray(i, i + 1152);
                const rChunk = right.subarray(i, i + 1152);
                const lInt16 = new Int16Array(lChunk.length);
                const rInt16 = new Int16Array(rChunk.length);
                for (let j = 0; j < lChunk.length; j++) {
                    lInt16[j] = lChunk[j] < 0 ? lChunk[j] * 32768 : lChunk[j] * 32767;
                    rInt16[j] = rChunk[j] < 0 ? rChunk[j] * 32768 : rChunk[j] * 32767;
                }
                const mp3buf = channels === 2 ? mp3encoder.encodeBuffer(lInt16, rInt16) : mp3encoder.encodeBuffer(lInt16);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            }
            const mp3buf = mp3encoder.flush();
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
            
            createDownloadLink(new Blob(mp3Data, { type: 'audio/mp3' }), `${safeName}_${Date.now()}.mp3`);
        } catch(e) {
            console.error("MP3 Encode Error:", e);
            createDownloadLink(webmBlob, `${safeName}_fallback.webm`);
        }
    }

    function createDownloadLink(blob, filename) {
        const url = URL.createObjectURL(blob);
        const div = document.createElement('div');
        div.className = 'download-item';
        div.innerHTML = `<span>💽 ${filename}</span><a href="${url}" download="${filename}">DOWNLOAD</a>`;
        document.getElementById('downloadLinks').appendChild(div);
    }

    // --- BGM IndexedDB ---
    const dbName = "RadioStudioDB_v4";
    let db;
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("bgmFiles", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = e => { db = e.target.result; updateBgmList(); };

    document.getElementById('bgmUpload').addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        const tx = db.transaction("bgmFiles", "readwrite");
        const store = tx.objectStore("bgmFiles");
        
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                store.add({ name: file.name, blob: new Blob([event.target.result], { type: file.type }) });
            };
            reader.readAsArrayBuffer(file);
        });

        tx.oncomplete = () => {
            updateBgmList();
            e.target.value = ""; 
            showMsg(`${files.length} track(s) saved.`);
        };
    });

    function updateBgmList() {
        const req = db.transaction("bgmFiles", "readonly").objectStore("bgmFiles").getAll();
        req.onsuccess = (e) => {
            const select = document.getElementById('bgmSelect');
            select.innerHTML = '<option value="">No Track</option>';
            e.target.result.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id; opt.text = f.name;
                select.appendChild(opt);
            });
        };
    }

    document.getElementById('bgmSelect').addEventListener('change', () => {
        const id = parseInt(document.getElementById('bgmSelect').value);
        const audio = document.getElementById('bgmAudio');
        if (!id) return audio.src = "";
        
        const req = db.transaction("bgmFiles", "readonly").objectStore("bgmFiles").get(id);
        req.onsuccess = (e) => {
            if (e.target.result) {
                audio.src = URL.createObjectURL(e.target.result.blob);
                if(!document.getElementById('btnRecord').disabled) audio.pause();
            }
        };
    });

    function drawWaveform(canvasId, analyser, color) {
        const canvas = document.getElementById(canvasId);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        analyser.fftSize = 2048;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            if(!document.getElementById(canvasId)) return; 
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = color;
            ctx.beginPath();
            const sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) {
                const y = (dataArray[i] / 128.0) * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }
        draw();
    }
</script>
